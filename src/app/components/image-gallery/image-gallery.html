<section class="gallery-container">
  <div class="gallery" #gallery>
    @for (item of items; track item.src; let i = $index) {
      <figure
        class="gallery-item"
        tabindex="0"
        role="button"
        [attr.aria-label]="'Open ' + item.title"
        (click)="openImage(i)"
        (keydown.enter)="openImage(i)"
        (keydown.space)="openImage(i); $event.preventDefault()"
      >
        <img [src]="item.src" [alt]="item.alt" class="gallery-img" loading="lazy" />
        <figcaption class="gallery-caption">
          <span class="caption-category">{{ item.category }}</span>
          <h3 class="caption-title">{{ item.title }}</h3>
          <p class="caption-desc">{{ item.description }}</p>
          <span class="cta">
            <span class="cta-line"></span>
            Bekijken
          </span>
        </figcaption>
      </figure>
    }
  </div>
</section>

@if (isImageOpen()) {
  <div
    #focusedImage
    class="focus-image"
    (click)="closeImage()"
    tabindex="-1"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="activeItem()?.title"
    (touchstart)="onTouchStart($event)"
    (touchend)="onTouchEnd($event)"
    (keydown)="onKeydown($event)"
  >
    <button
      class="close-image"
      (click)="closeImage(); $event.stopPropagation()"
      aria-label="Close the image"
    >
      <svg width="35" height="35" viewBox="0 0 20 20" fill="none">
        <line
          x1="4"
          y1="4"
          x2="16"
          y2="16"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
        />
        <line
          x1="16"
          y1="4"
          x2="4"
          y2="16"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
        />
      </svg>
    </button>
    <div class="focus-image-item" (click)="$event.stopPropagation()">
      <button
        class="focus-image-nav focus-image-nav-prev"
        (click)="prevItem()"
        aria-label="Previous image"
      >
        <svg width="30" height="30" viewBox="0 0 20 20" fill="none">
          <polyline
            points="13,4 7,10 13,16"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>

      @if (activeItem(); as item) {
        <div class="focus-image-item-container">
          <img [src]="item.src" [alt]="item.alt" class="focus-image-img" />
        </div>
        <div class="focus-image-info">
          <span class="info-category">{{ item.category }}</span>
          <h2 class="info-title">{{ item.title }}</h2>
          <p class="info-desc">{{ item.description }}</p>
          <span class="info-counter"> {{ (activeIndex() ?? 0) + 1 }} / {{ items.length }} </span>
        </div>
      }
      <button
        class="focus-image-nav focus-image-nav-next"
        (click)="nextItem()"
        aria-label="Next image"
      >
        <svg width="30" height="30" viewBox="0 0 20 20" fill="none">
          <polyline
            points="7,4 13,10 7,16"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
  </div>
}
