<div class="image-container" #container>
  <div class="zoom-wrapper" #zoomWrapper>
    <img src="leuven-map/LeuvenMap.webp" alt="Kaart van leuven en omgevingen" draggable="false" />

    @for (zone of zones(); track zone.id) {
      <div class="zone" [style.left.%]="zone.x" [style.top.%]="zone.y">
        <svg width="45" height="45" viewBox="0 0 16 16" class="icon">
          <path
            fill="#444"
            d="M4 2c0-1.1-.9-2-2-2S0 .9 0 2c0 .7.4 1.4 1 1.7V16h2V3.7c.6-.3 1-1 1-1.7"
          />
          <path
            class="flag"
            fill="#444"
            d="M4 4s1-3 3.6-3c2.7 0 2.3 1 4.4 1 2.4 0 4-1 4-1v8s-.7 2-4 2c-2.2 0-2.3-1-5-1-2.3 0-3 2-3 2z"
          />
        </svg>
      </div>
    }
  </div>

  <div class="legend">
    <div class="legend-info">
      <img src="SVGs/active_map_flag.svg" alt="" />
      <p>Huidige locatie</p>
    </div>
    <div class="legend-info">
      <img src="SVGs/map_flag.svg" alt="" />
      <p>Andere locatie</p>
    </div>
  </div>
</div>
