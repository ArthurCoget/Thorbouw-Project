<section class="project-detail">
  <app-top-image-component
    [noPath]="true"
    [content]="heroContent"
    [customImagePosition]="project?.offset || 65"
  ></app-top-image-component>
  <nav class="breadcrumb">
    <a routerLink="/fotos">Foto's</a>
    <span>›</span>
    <span>{{ project?.title }}</span>
  </nav>
  <div class="content-header-container">
    <h1 class="title">{{ project?.subtitle }}</h1>
    <p class="subtitle">{{ project?.description }}</p>
  </div>
  <app-image-carousel-component
    [maxNumberOfItems]="true"
    [items]="carouselImages"
    [showInfo]="false"
  ></app-image-carousel-component>
  <div class="content-header-container no-description">
    <h2 class="title">{{ DETAILS_CONTENT.galleryTitle }}</h2>
  </div>
  <app-image-gallery [items]="images"></app-image-gallery>
  <div class="content-header-container no-description">
    <h2 class="title">{{ DETAILS_CONTENT.mapTitile }}</h2>
  </div>
  <app-interactive-leuven-map></app-interactive-leuven-map>
</section>
