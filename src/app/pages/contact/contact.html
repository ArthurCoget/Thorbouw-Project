<section>
  <app-top-image-component
    [content]="heroContent"
    [customImagePosition]="35"
  ></app-top-image-component>

  <div class="content-header-container">
    <h1 class="contact-title">{{ contactContent.contactTitle }}</h1>
    <p class="contact-subtitle">{{ contactContent.contactSubTitle }}</p>
  </div>
  <div class="contact-grid">
    @for (item of list; track $index) {
      <app-contact-card></app-contact-card>
    }
  </div>
</section>
