<section class="fotos_page">
  <app-top-image-component [customImagePosition]="40" [content]="heroContent" />

  <div class="content-header-container">
    <h1 class="title">Lijst van eerder gerealisseerde projecten</h1>
    <p class="subtitle">
      U kunt dit gebruiken als referentie, dit is geen representatie van uw finale product
    </p>
  </div>
  <div class="projects-container">
    @for (project of projects; track project.slug) {
      <app-foto-card [project]="project" />
    }
  </div>
</section>
